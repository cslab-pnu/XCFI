# Default base configuration file

CONFIG_TEST=y

# eliminate timer interrupts during the benchmark
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1

# We use irq_offload(), enable it
CONFIG_IRQ_OFFLOAD=y

# Reduce memory/code footprint
CONFIG_BT=n
CONFIG_FORCE_NO_ASSERT=y

CONFIG_TEST_HW_STACK_PROTECTION=n
# Disable HW Stack Protection (see #28664)
CONFIG_HW_STACK_PROTECTION=n
CONFIG_COVERAGE=n

# Disable system power management
CONFIG_PM=n

CONFIG_TIMING_FUNCTIONS=y

CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_APPLICATION_DEFINED_SYSCALL=y

# Disable time slicing
CONFIG_TIMESLICING=n

# Enable events
CONFIG_EVENTS=y

CONFIG_LLVM_USE_LLD=y
CONFIG_COMPILER_RT_RTLIB=y

#CONFIG_USERSPACE=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

#CONFIG_NO_OPTIMIZATIONS=n #-O0
#CONFIG_SPEED_OPTIMIZATIONS=n # -O2
#CONFIG_SIZE_OPTIMIZATIONS=y # -Os
#CONFIG_SIZE_OPTIMIZATIONS_AGGRESSIVE=n # -Oz
#CONFIG_SPEED_OPTIMIZATIONS_FAST=n # -O3

CONFIG_COMPILER_OPT="-O2"
